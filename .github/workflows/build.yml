name: Build

on:
  push:
    branches: [ main, createSkeleton ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Build and verify
        run: mvn -B -ntp clean verify
      - name: JAR size gate
        shell: bash
        run: |
          size=$(stat -c%s target/jauditor-jmeter-plugin-*.jar 2>/dev/null || wc -c < target/jauditor-jmeter-plugin-*.jar)
          echo "JAR size: $size bytes"
          test "$size" -lt 5242880
