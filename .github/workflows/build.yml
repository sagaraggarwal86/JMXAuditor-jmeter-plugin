name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build and verify
        run: mvn -B -ntp clean verify
      - name: JAR size gate
        shell: bash
        run: |
          jar=$(ls target/jmxauditor-jmeter-plugin-*.jar | grep -vE 'sources|javadoc|original' | head -n1)
          size=$(wc -c < "$jar")
          echo "JAR: $jar  size: $size bytes"
          test "$size" -lt 5242880
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest'
        with:
          name: jmxauditor-jmeter-plugin
          path: target/jmxauditor-jmeter-plugin-*.jar
      - uses: actions/upload-artifact@v7
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          name: test-reports
          path: target/surefire-reports/
