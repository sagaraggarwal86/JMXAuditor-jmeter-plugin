# Minimal JMeter properties for unit tests.
# Just enough for JMeterUtils.loadJMeterProperties() and TestElement instantiation
# to succeed without a live JMeter installation. The harness loads this via
# JmxTestHarness.init() before any test creates a TestElement.
language=en
time.YMD=yyyyMMdd
time.HMS=HHmmss
time.YMDHMS=yyyyMMdd-HHmmss
time.USER1=
time.USER2=
log_level.jmeter=INFO
saveservice_properties=/saveservice.properties
upgrade_properties=/upgrade.properties
xstream.version=1.4.21
